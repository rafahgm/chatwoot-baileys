services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner  # Usar apenas stage final
    container_name: baileys-chatwoot-bridge
    restart: unless-stopped
    
    ports:
      - "${PORT:-3000}:3000"
    
    environment:
      # === Node ===
      - NODE_ENV=production
      - PORT=3000
      - TZ=America/Sao_Paulo
      
      # === Database ===
      - DATABASE_URL=${DATABASE_URL:-file:./data/prod.db}
      
      # === Chatwoot ===
      - CHATWOOT_BASE_URL=${CHATWOOT_BASE_URL}
      - CHATWOOT_API_TOKEN=${CHATWOOT_API_TOKEN}
      - CHATWOOT_ACCOUNT_ID=${CHATWOOT_ACCOUNT_ID}
      - CHATWOOT_INBOX_ID=${CHATWOOT_INBOX_ID}
      
      # === Webhook Security ===
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
      
      # === Baileys ===
      - BAILEYS_AUTH_DIR=/app/auth_info
      - BAILEYS_BROWSER_NAME=BaileysChatwootBridge
      
      # === Media ===
      - MEDIA_UPLOAD_DIR=/app/uploads
      - MEDIA_MAX_SIZE=50mb
      - MEDIA_BASE_URL=${MEDIA_BASE_URL:-http://localhost:3000/uploads}
      
      # === Logging ===
      - LOG_LEVEL=${LOG_LEVEL:-info}
    
    volumes:
      # Auth state do WhatsApp (sessão persistente)
      - baileys-auth:/app/auth_info
      
      # Uploads de mídia
      - baileys-uploads:/app/uploads
      
      # Banco de dados SQLite
      - baileys-data:/app/data
    
    networks:
      - bridge-network
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    # Limites de recursos (ajustar conforme necessidade)
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

  # Opcional: Redis para cache de mapeamentos LID ↔ PN
  # (Recomendado para produção com múltiplas instâncias)
  redis:
    image: redis:7-alpine
    container_name: baileys-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - bridge-network
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  baileys-auth:
    driver: local
  baileys-uploads:
    driver: local
  baileys-data:
    driver: local
  redis-data:
    driver: local

networks:
  bridge-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16