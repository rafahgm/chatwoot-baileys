services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: baileys-chatwoot-dev
    restart: unless-stopped

    ports:
      - "${PORT:-3000}:3000"

    environment:
      # === Node ===
      - NODE_ENV=development
      - PORT=3000
      - TZ=America/Sao_Paulo

      # === Database ===
      - DATABASE_URL=${DATABASE_URL:-file:./data/dev.db}

      # === Chatwoot ===
      - CHATWOOT_BASE_URL=${CHATWOOT_BASE_URL}
      - CHATWOOT_API_TOKEN=${CHATWOOT_API_TOKEN}
      - CHATWOOT_ACCOUNT_ID=${CHATWOOT_ACCOUNT_ID}
      - CHATWOOT_INBOX_ID=${CHATWOOT_INBOX_ID}

      # === Webhook Security ===
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}

      # === Baileys ===
      - BAILEYS_AUTH_DIR=/app/auth_info
      - BAILEYS_BROWSER_NAME=BaileysChatwootBridgeDev

      # === Media ===
      - MEDIA_UPLOAD_DIR=/app/uploads
      - MEDIA_MAX_SIZE=50mb
      - MEDIA_BASE_URL=${MEDIA_BASE_URL:-http://localhost:3000/uploads}

      # === Logging ===
      - LOG_LEVEL=${LOG_LEVEL:-debug}

    volumes:
      # Código fonte com hot reload
      - .:/app

      # Proteger node_modules do container contra sobrescrita pelo bind mount
      - /app/node_modules
      - /app/node_modules/.prisma

      # Dados persistentes (volumes nomeados para não poluir o host)
      - baileys-auth-dev:/app/auth_info
      - baileys-uploads-dev:/app/uploads
      - baileys-data-dev:/app/data

    networks:
      - bridge-network-dev

volumes:
  baileys-auth-dev:
  baileys-uploads-dev:
  baileys-data-dev:

networks:
  bridge-network-dev:
    driver: bridge
